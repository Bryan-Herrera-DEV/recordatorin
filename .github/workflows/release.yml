name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: version
        run: |
          npm version "${{ inputs.bump }}" -m "chore(release): v%s"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags

  release-dispatch:
    if: github.event_name == 'workflow_dispatch'
    needs: create-version
    runs-on: windows-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-version.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Recordatorin-${{ needs.create-version.outputs.version }}-windows
          path: release/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-version.outputs.tag }}
          name: Recordatorin ${{ needs.create-version.outputs.tag }}
          generate_release_notes: true
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-tag:
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Recordatorin-${{ github.ref_name }}-windows
          path: release/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Recordatorin ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
