name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: version
        run: |
          npm version "${{ inputs.bump }}" -m "chore(release): v%s"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags

  build-dispatch:
    if: github.event_name == 'workflow_dispatch'
    needs: create-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build-script: npm run dist:win
            artifact-path: release/*.exe
          - os: ubuntu-latest
            platform: linux
            build-script: npm run dist:linux
            artifact-path: release/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-version.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Audit
        run: npm run audit

      - name: Build ${{ matrix.platform }} installer
        run: ${{ matrix.build-script }}
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Verify Windows native dependency
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $binding = 'release/win-unpacked/resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release/better_sqlite3.node'
          if (-not (Test-Path -LiteralPath $binding)) {
            throw "Missing better-sqlite3 native binding: $binding"
          }

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: Recordatorin-${{ needs.create-version.outputs.version }}-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-dispatch:
    if: github.event_name == 'workflow_dispatch'
    needs:
      - create-version
      - build-dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-version.outputs.tag }}
          name: Recordatorin ${{ needs.create-version.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tag:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build-script: npm run dist:win
            artifact-path: release/*.exe
          - os: ubuntu-latest
            platform: linux
            build-script: npm run dist:linux
            artifact-path: release/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Audit
        run: npm run audit

      - name: Build ${{ matrix.platform }} installer
        run: ${{ matrix.build-script }}
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Verify Windows native dependency
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $binding = 'release/win-unpacked/resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release/better_sqlite3.node'
          if (-not (Test-Path -LiteralPath $binding)) {
            throw "Missing better-sqlite3 native binding: $binding"
          }

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: Recordatorin-${{ github.ref_name }}-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-tag:
    if: github.event_name == 'push'
    needs: build-tag
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Recordatorin ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
